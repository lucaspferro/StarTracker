<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AstroZeca — Observatory Control</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

	<!-- HEADER -->
	<div class="header">
		<h1>Observatory</h1>
		<div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
			<span>OBSERVATORY CONTROL</span>
			<div class="badge">
				<div class="badge-dot disconnected" id="conn-dot"></div>
				<span id="conn-label">DISCONNECTED</span>
			</div>
		</div>
	</div>

	<!-- STATUS -->
	<div id="status">IDLE</div>

	<!-- CARDS -->
	<div class="cards">
		<div class="card">
			<div class="card-label">Elapsed</div>
			<div class="card-value" id="val-time">0.00</div>
			<div class="card-unit">minutes</div>
		</div>
		<div class="card">
			<div class="card-label">Angle</div>
			<div class="card-value" id="val-angle">0.0000</div>
			<div class="card-unit">degrees</div>
		</div>
		<div class="card wide">
			<div class="card-label">Speed</div>
			<div class="card-value" id="val-rpm">0.00000</div>
			<div class="card-unit">RPM</div>
		</div>
	</div>

	<!-- INITIAL ANGLE -->
	<div class="group">
		<span class="group-title">INITIAL ANGLE</span>
		<div class="angle-row">
			<label for="initial-angle">Starting position of the tracker</label>
			<input type="number" id="initial-angle" value="10.0" min="0" max="90" step="0.1">
		</div>
	</div>

	<!-- MANUAL SLEW -->
	<div class="group">
		<span class="group-title">MANUAL SLEW</span>
		<label class="manual-check">
			<input type="checkbox" id="chk-manual"> Enable Manual Mode
		</label>
		<input type="range" id="slider" min="-60" max="60" value="0" disabled>
		<div id="slider-val">0 RPM</div>
	</div>

	<!-- BUTTONS -->
	<div class="buttons">
		<button id="btn-start">START</button>
		<button id="btn-stop">STOP</button>
		<button id="btn-rewind">REWIND</button>
		<button id="btn-reset">RESET</button>
	</div>

</div>

<script src="/static/main.js"></script>
</body>
</html>
